name: regression-suite

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      manifest:
        description: "Suite manifest path"
        required: false
        default: "manifests/regression_v2_suite.json"
        type: string
      changed_only:
        description: "Run changed-scope suite instead of full suite"
        required: false
        default: false
        type: boolean
      require_ship:
        description: "Fail unless gate decision is ship"
        required: false
        default: true
        type: boolean
      notify_channel:
        description: "Optional notification channel: none, slack_webhook, feishu_webhook"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - slack_webhook
          - feishu_webhook
      route_override_channel:
        description: "Optional explicit route override"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - slack_webhook
          - feishu_webhook
      require_policy_gate:
        description: "Fail unless notification policy gate passes"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "20 18 * * *"

permissions:
  contents: read

concurrency:
  group: regression-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUITE_MANIFEST: ${{ inputs.manifest || 'manifests/regression_v2_suite.json' }}
      CHANGED_ONLY: ${{ inputs.changed_only == true }}
      REQUIRE_SHIP: ${{ inputs.require_ship != false }}
      NOTIFY_CHANNEL: ${{ inputs.notify_channel || 'none' }}
      ROUTE_OVERRIDE_CHANNEL: ${{ inputs.route_override_channel || 'none' }}
      REQUIRE_POLICY_GATE: ${{ inputs.require_policy_gate != false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine Suite Mode
        id: suite_mode
        shell: bash
        run: |
          mkdir -p runs
          args=()
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "$CHANGED_ONLY" = "true" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
              git diff --name-only "origin/${{ github.base_ref }}"...HEAD > runs/changed_files.txt
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              git diff --name-only HEAD^ HEAD > runs/changed_files.txt
            else
              : > runs/changed_files.txt
            fi
            args+=(--changed-files-path runs/changed_files.txt --clean-regression-artifacts)
          fi
          if [ "$REQUIRE_SHIP" = "true" ]; then
            args+=(--require-ship)
          fi
          printf 'suite_args=%s\n' "${args[*]}" >> "$GITHUB_OUTPUT"

      - name: Run Regression Suite
        env:
          SUITE_ARGS: ${{ steps.suite_mode.outputs.suite_args }}
        run: |
          python3 code/stage_harness/suite_runner.py \
            --manifest "$SUITE_MANIFEST" \
            --output runs/regression_suite_report.json \
            --md-output runs/regression_suite_report.md \
            --strict \
            $SUITE_ARGS

      - name: Build Harness Trend Board
        if: always()
        run: |
          if [ -f runs/regression_suite_report.json ] && [ -f runs/summary_board.json ]; then
            baseline_args=()
            if [ -f manifests/harness_trend_baseline.json ]; then
              baseline_args+=(--baseline-snapshot manifests/harness_trend_baseline.json)
            fi
            python3 code/stage_harness/trend_board.py \
              --summary-board runs/summary_board.json \
              --suite-report runs/regression_suite_report.json \
              --snapshot-output runs/harness_trend_snapshot.json \
              --output runs/harness_trend_board.json \
              --md-output runs/harness_trend_board.md \
              "${baseline_args[@]}"
          fi

      - name: Build Notification Digest
        if: always()
        run: |
          if [ -f runs/regression_suite_report.json ] && [ -f runs/summary_board.json ] && [ -f runs/gate_report.json ]; then
            python3 code/stage_harness/notification_digest.py \
              --suite-report runs/regression_suite_report.json \
              --summary-board runs/summary_board.json \
              --gate-report runs/gate_report.json \
              --output runs/notification_digest.json \
              --md-output runs/notification_digest.md
          fi

      - name: Build Notification Payloads
        if: always()
        run: |
          if [ -f runs/notification_digest.json ]; then
            python3 code/stage_harness/notification_payloads.py \
              --digest runs/notification_digest.json \
              --slack-output runs/notification_slack.json \
              --feishu-output runs/notification_feishu.json
          fi

      - name: Select Notification Route
        if: always()
        id: notification_route
        run: |
          if [ -f runs/notification_digest.json ]; then
            override_args=()
            if [ "$ROUTE_OVERRIDE_CHANNEL" != "none" ]; then
              override_args+=(--override-channel "$ROUTE_OVERRIDE_CHANNEL")
            fi
            python3 code/stage_harness/notification_route.py \
              --digest runs/notification_digest.json \
              --routes manifests/notification_routes.json \
              --event-name "${{ github.event_name }}" \
              --default-channel "$NOTIFY_CHANNEL" \
              "${override_args[@]}" \
              --output runs/notification_route.json
            channel=$(python3 - <<'PY'
import json
from pathlib import Path
obj=json.loads(Path('runs/notification_route.json').read_text())
print(obj['channel'])
PY
)
            payload=$(python3 - <<'PY'
import json
from pathlib import Path
obj=json.loads(Path('runs/notification_route.json').read_text())
print(obj.get('payload_path') or '')
PY
)
            printf 'channel=%s\n' "$channel" >> "$GITHUB_OUTPUT"
            printf 'payload_path=%s\n' "$payload" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Notification Route Matrix
        if: always()
        run: |
          python3 code/stage_harness/notification_route_matrix.py \
            --routes manifests/notification_routes_baseline.json \
            --output runs/notification_route_matrix_baseline.json \
            --md-output runs/notification_route_matrix_baseline.md
          python3 code/stage_harness/notification_route_matrix.py \
            --routes manifests/notification_routes.json \
            --output runs/notification_route_matrix_candidate.json \
            --md-output runs/notification_route_matrix_candidate.md

      - name: Route Lint
        if: always()
        run: |
          python3 code/stage_harness/notification_route_lint.py \
            --routes manifests/notification_routes.json \
            --output runs/notification_route_lint.json

      - name: Route Policy Diff
        if: always()
        run: |
          python3 code/stage_harness/notification_route_diff.py \
            --baseline runs/notification_route_matrix_baseline.json \
            --candidate runs/notification_route_matrix_candidate.json \
            --output runs/notification_route_diff.json \
            --md-output runs/notification_route_diff.md

      - name: Route Policy Gate
        if: always()
        run: |
          python3 code/stage_harness/notification_policy_gate.py \
            --route-diff runs/notification_route_diff.json \
            --policy manifests/notification_policy_gate.json \
            --output runs/notification_policy_gate.json

      - name: Notification Dispatch Policy
        if: always()
        id: notification_dispatch_policy
        run: |
          if [ -f runs/notification_digest.json ] && [ -f runs/notification_route.json ]; then
            python3 code/stage_harness/notification_dispatch_policy.py \
              --digest runs/notification_digest.json \
              --route runs/notification_route.json \
              --policy manifests/notification_dispatch_policy.json \
              --event-name "${{ github.event_name }}" \
              --output runs/notification_dispatch_policy.json
            allow=$(python3 - <<'PY'
import json
from pathlib import Path
obj=json.loads(Path('runs/notification_dispatch_policy.json').read_text())
print(str(obj['allow_dispatch']).lower())
PY
)
            printf 'allow_dispatch=%s\n' "$allow" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce Notification Policy Gate
        if: always() && env.REQUIRE_POLICY_GATE == 'true'
        run: |
          python3 code/stage_harness/notification_policy_gate.py \
            --route-diff runs/notification_route_diff.json \
            --policy manifests/notification_policy_gate.json \
            --fail-on-non-ship

      - name: Build Notification Review Summary
        if: always()
        run: |
          if [ -f runs/notification_digest.json ] && [ -f runs/notification_route.json ] && [ -f runs/notification_policy_gate.json ] && [ -f runs/notification_dispatch_policy.json ]; then
            python3 code/stage_harness/notification_review_summary.py \
              --digest runs/notification_digest.json \
              --route runs/notification_route.json \
              --policy-gate runs/notification_policy_gate.json \
              --dispatch-policy runs/notification_dispatch_policy.json \
              --output runs/notification_review_summary.json \
              --md-output runs/notification_review_summary.md
          fi

      - name: Optional Notification Dispatch
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ "${{ steps.notification_dispatch_policy.outputs.allow_dispatch }}" = "true" ] && [ "${{ steps.notification_route.outputs.channel }}" = "slack_webhook" ] && [ -f "${{ steps.notification_route.outputs.payload_path }}" ] && [ -n "$SLACK_WEBHOOK_URL" ]; then
            python3 code/stage_harness/notification_dispatch.py \
              --payload "${{ steps.notification_route.outputs.payload_path }}" \
              --channel slack_webhook
          elif [ "${{ steps.notification_dispatch_policy.outputs.allow_dispatch }}" = "true" ] && [ "${{ steps.notification_route.outputs.channel }}" = "feishu_webhook" ] && [ -f "${{ steps.notification_route.outputs.payload_path }}" ] && [ -n "$FEISHU_WEBHOOK_URL" ]; then
            python3 code/stage_harness/notification_dispatch.py \
              --payload "${{ steps.notification_route.outputs.payload_path }}" \
              --channel feishu_webhook
          else
            echo "notification dispatch skipped"
          fi

      - name: Publish Job Summary
        if: always()
        run: |
          if [ -f runs/harness_trend_board.md ]; then
            cat runs/harness_trend_board.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f runs/notification_review_summary.md ]; then
            cat runs/notification_review_summary.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f runs/notification_digest.md ]; then
            cat runs/notification_digest.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f runs/notification_route_diff.md ]; then
            printf '\n## Notification Route Diff\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat runs/notification_route_diff.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f runs/regression_suite_report.md ]; then
            printf '\n## Regression Suite\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat runs/regression_suite_report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f runs/summary_board.md ]; then
            printf '\n## Summary Board\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat runs/summary_board.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Regression Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-suite-${{ github.run_id }}
          path: |
            runs/*.json
            runs/*.md
            runs/changed_files.txt
