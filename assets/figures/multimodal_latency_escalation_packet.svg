<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="960" height="560" rx="14" fill="url(#bg)"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Latency Escalation Packet</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">latency review page + regional escalation matrix</text>

  <rect x="70" y="90" width="360" height="410" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.4"/>
  <rect x="70" y="90" width="360" height="22" rx="12" fill="url(#blue)"/>
  <text x="250" y="105" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle" font-weight="bold">PAGE 1 · LATENCY REVIEW</text>
  <text x="96" y="150" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">Metric: queue_wait</text>
  <text x="96" y="184" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">SLA threshold: 30 minutes</text>
  <text x="96" y="234" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">US   | 28</text>
  <text x="96" y="270" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">EU   | 3O</text>
  <text x="96" y="306" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">APAC | 18</text>

  <rect x="530" y="90" width="360" height="410" rx="12" fill="#111827" stroke="#10b981" stroke-width="1.4"/>
  <rect x="530" y="90" width="360" height="22" rx="12" fill="url(#green)"/>
  <text x="710" y="105" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle" font-weight="bold">PAGE 2 · ESCALATION MATRIX</text>
  <text x="556" y="150" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">Region        Owner</text>
  <line x1="556" y1="162" x2="760" y2="162" stroke="#475569" stroke-width="1"/>
  <text x="556" y="202" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="11">US            us-ops</text>
  <text x="556" y="238" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="11">EU            europe-ops</text>
  <text x="556" y="274" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="11">APAC          apac-ops</text>

  <rect x="246" y="516" width="468" height="20" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="530" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">Correct answer requires normalizing 3O -&gt; 30, detecting EU as first breach, then joining to page 2 owner.</text>
