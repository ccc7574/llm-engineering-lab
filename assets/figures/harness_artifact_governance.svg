  <rect width="960" height="560" fill="url(#bg)" rx="14"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Harness Artifact Governance</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">suite -> catalog -> baseline snapshot -> failure replay</text>

  <rect x="36" y="86" width="888" height="438" fill="#0f172a" rx="14" stroke="#334155" stroke-width="1.2"/>

  <rect x="62" y="120" width="176" height="86" fill="#15162b" rx="10" stroke="#7c3aed" stroke-width="1.6"/>
  <rect x="62" y="120" width="176" height="18" fill="url(#purple)" rx="10"/>
  <text x="150" y="133" fill="#f5f3ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">STEP 1</text>
  <text x="150" y="158" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Regression Suite</text>
  <text x="150" y="176" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">eval reports</text>
  <text x="150" y="190" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">diff artifacts</text>

  <rect x="286" y="120" width="190" height="86" fill="#15162b" rx="10" stroke="#ea580c" stroke-width="1.6"/>
  <rect x="286" y="120" width="190" height="18" fill="url(#orange)" rx="10"/>
  <text x="381" y="133" fill="#fff7ed" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">STEP 2</text>
  <text x="381" y="158" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Artifact Catalog</text>
  <text x="381" y="176" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">category + lifecycle</text>
  <text x="381" y="190" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">sha256 + source step</text>

  <rect x="524" y="120" width="190" height="86" fill="#15162b" rx="10" stroke="#1d4ed8" stroke-width="1.6"/>
  <rect x="524" y="120" width="190" height="18" fill="url(#blue)" rx="10"/>
  <text x="619" y="133" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">STEP 3</text>
  <text x="619" y="158" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Baseline Snapshot</text>
  <text x="619" y="176" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">versioned directory</text>
  <text x="619" y="190" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">hash-verified manifest</text>

  <rect x="750" y="120" width="148" height="86" fill="#15162b" rx="10" stroke="#059669" stroke-width="1.6"/>
  <rect x="750" y="120" width="148" height="18" fill="url(#green)" rx="10"/>
  <text x="824" y="133" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">STEP 4</text>
  <text x="824" y="158" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Failure Replay</text>
  <text x="824" y="176" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">step replay plan</text>
  <text x="824" y="190" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" text-anchor="middle">failed item hints</text>

  <line x1="238" y1="163" x2="286" y2="163" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="476" y1="163" x2="524" y2="163" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="714" y1="163" x2="750" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="74" y="262" width="250" height="224" fill="#111827" rx="12" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="199" y="288" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">Lifecycle Policy</text>
  <rect x="96" y="310" width="206" height="44" fill="#0f172a" rx="8" stroke="#eab308" stroke-width="1.2"/>
  <text x="199" y="330" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">promote_on_ship</text>
  <text x="199" y="344" fill="#fef3c7" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">suite report, summary board, gate, release note</text>
  <rect x="96" y="370" width="206" height="44" fill="#0f172a" rx="8" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="199" y="390" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">retain_for_replay</text>
  <text x="199" y="404" fill="#dbeafe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">eval reports, route artifacts, replay packets</text>
  <rect x="96" y="430" width="206" height="36" fill="#0f172a" rx="8" stroke="#475569" stroke-width="1.2"/>
  <text x="199" y="452" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">ephemeral_debug</text>

  <rect x="356" y="262" width="272" height="224" fill="#111827" rx="12" stroke="#ea580c" stroke-width="1.2"/>
  <text x="492" y="288" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">Governance Guarantees</text>
  <text x="380" y="324" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">1. Manifest outputs mapped to files</text>
  <text x="380" y="352" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">2. Each artifact gets category + lifecycle</text>
  <text x="380" y="380" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">3. Snapshot keeps source path + sha256</text>
  <text x="380" y="408" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">4. Replay plan exposes exact rerun command</text>
  <text x="380" y="436" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">5. Release evidence and debug files stay separate</text>

  <rect x="660" y="262" width="238" height="224" fill="#111827" rx="12" stroke="#10b981" stroke-width="1.2"/>
  <text x="779" y="288" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">Reviewer View</text>
  <rect x="684" y="314" width="190" height="34" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="779" y="335" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.4" text-anchor="middle">What should we archive?</text>
  <rect x="684" y="362" width="190" height="34" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="779" y="383" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.4" text-anchor="middle">What becomes the next baseline?</text>
  <rect x="684" y="410" width="190" height="34" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="779" y="431" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.4" text-anchor="middle">How do we replay a failure fast?</text>

  <path d="M324 392 C346 392 350 392 356 392" fill="none" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <path d="M628 392 C646 392 648 392 660 392" fill="none" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <rect x="292" y="506" width="376" height="26" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="480" y="523" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">policy-driven artifact governance is what turns one-off runs into reusable release evidence</text>
</svg>
