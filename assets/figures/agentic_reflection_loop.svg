<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="14" fill="url(#bg)"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Agentic Reflection Loop</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">A11: draft, critique, revise, and measure whether extra steps actually buy reliability</text>

  <rect x="36" y="84" width="888" height="438" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>

  <rect x="60" y="118" width="128" height="82" rx="10" fill="#111827" stroke="#7c3aed" stroke-width="1.4"/>
  <rect x="60" y="118" width="128" height="18" rx="10" fill="url(#purple)"/>
  <text x="124" y="131" fill="#f5f3ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">TASK</text>
  <text x="124" y="158" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Goal + Tools</text>
  <text x="124" y="176" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">inputs, context, constraints</text>

  <rect x="218" y="118" width="136" height="82" rx="10" fill="#111827" stroke="#1d4ed8" stroke-width="1.4"/>
  <rect x="218" y="118" width="136" height="18" rx="10" fill="url(#blue)"/>
  <text x="286" y="131" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">DRAFT</text>
  <text x="286" y="158" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">First Attempt</text>
  <text x="286" y="176" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">often fast, often brittle</text>

  <rect x="384" y="118" width="144" height="82" rx="10" fill="#111827" stroke="#ea580c" stroke-width="1.4"/>
  <rect x="384" y="118" width="144" height="18" rx="10" fill="url(#orange)"/>
  <text x="456" y="131" fill="#fff7ed" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">CRITIQUE</text>
  <text x="456" y="158" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Self-Check</text>
  <text x="456" y="176" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">missing tool call? wrong field? bad state?</text>

  <rect x="558" y="118" width="136" height="82" rx="10" fill="#111827" stroke="#059669" stroke-width="1.4"/>
  <rect x="558" y="118" width="136" height="18" rx="10" fill="url(#green)"/>
  <text x="626" y="131" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">REVISE</text>
  <text x="626" y="158" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Second Pass</text>
  <text x="626" y="176" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">repair plan before final answer</text>

  <rect x="724" y="118" width="172" height="82" rx="10" fill="#111827" stroke="#eab308" stroke-width="1.4"/>
  <rect x="724" y="118" width="172" height="18" rx="10" fill="url(#gold)"/>
  <text x="810" y="131" fill="#fef9c3" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">EVAL + RELEASE</text>
  <text x="810" y="158" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Task Success</text>
  <text x="810" y="176" fill="#fef08a" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">did reflection justify its added cost?</text>

  <line x1="188" y1="160" x2="218" y2="160" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="354" y1="160" x2="384" y2="160" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="528" y1="160" x2="558" y2="160" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="694" y1="160" x2="724" y2="160" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M626 208 C626 248 456 248 456 208" fill="none" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="540" y="242" fill="#fcd34d" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.6" text-anchor="middle">critique can trigger another revise pass</text>

  <rect x="68" y="260" width="252" height="200" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="194" y="288" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">When Reflection Helps</text>
  <text x="90" y="324" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- first answer forgot a tool call</text>
  <text x="90" y="350" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- answer format violated workflow contract</text>
  <text x="90" y="376" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- state or evidence was only partially used</text>
  <text x="90" y="412" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">reflection is useful when critique points to a specific, fixable defect</text>

  <rect x="354" y="260" width="252" height="200" rx="12" fill="#111827" stroke="#f97316" stroke-width="1.2"/>
  <text x="480" y="288" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">What Must Be Measured</text>
  <text x="376" y="324" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- task success rate</text>
  <text x="376" y="350" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- avg_reflection_steps</text>
  <text x="376" y="376" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- extra tool calls and latency</text>
  <text x="376" y="402" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- failure types before vs after reflection</text>

  <rect x="640" y="260" width="252" height="200" rx="12" fill="#111827" stroke="#eab308" stroke-width="1.2"/>
  <text x="766" y="288" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">Guardrails</text>
  <text x="662" y="324" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- cap reflection depth</text>
  <text x="662" y="350" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- do not let critique invent new facts</text>
  <text x="662" y="376" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- keep baseline direct/tool_use route for comparison</text>
  <text x="662" y="412" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">extra steps are only worth it when reliability improves enough to pay for the latency</text>

  <rect x="148" y="476" width="664" height="24" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="492" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">The point of reflection is not to look thoughtful. The point is to convert a diagnosable draft failure into a measurable success delta.</text>
</svg>
