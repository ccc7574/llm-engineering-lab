<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="14" fill="url(#bg)"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Multimodal Document Workflow</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">M05: route pages, normalize tables, join workflow evidence, then return the business owner</text>

  <rect x="36" y="86" width="888" height="438" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>

  <rect x="62" y="120" width="144" height="84" rx="10" fill="#111827" stroke="#7c3aed" stroke-width="1.4"/>
  <rect x="62" y="120" width="144" height="18" rx="10" fill="url(#purple)"/>
  <text x="134" y="133" fill="#f5f3ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">INPUT PACKET</text>
  <text x="134" y="160" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Multi-Page Docs</text>
  <text x="134" y="178" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">invoice, latency review, policy, matrix</text>

  <rect x="236" y="120" width="150" height="84" rx="10" fill="#111827" stroke="#1d4ed8" stroke-width="1.4"/>
  <rect x="236" y="120" width="150" height="18" rx="10" fill="url(#blue)"/>
  <text x="311" y="133" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">ROUTING</text>
  <text x="311" y="160" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Page + Region</text>
  <text x="311" y="178" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">which page and which table matter?</text>

  <rect x="416" y="120" width="156" height="84" rx="10" fill="#111827" stroke="#ea580c" stroke-width="1.4"/>
  <rect x="416" y="120" width="156" height="18" rx="10" fill="url(#orange)"/>
  <text x="494" y="133" fill="#fff7ed" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">NORMALIZE</text>
  <text x="494" y="160" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Fields + Tables</text>
  <text x="494" y="178" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">3O -&gt; 30, row joins, key cleanup</text>

  <rect x="602" y="120" width="152" height="84" rx="10" fill="#111827" stroke="#059669" stroke-width="1.4"/>
  <rect x="602" y="120" width="152" height="18" rx="10" fill="url(#green)"/>
  <text x="678" y="133" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">JOIN</text>
  <text x="678" y="160" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Workflow Logic</text>
  <text x="678" y="178" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">threshold, policy, owner lookup</text>

  <rect x="784" y="120" width="112" height="84" rx="10" fill="#111827" stroke="#eab308" stroke-width="1.4"/>
  <rect x="784" y="120" width="112" height="18" rx="10" fill="url(#gold)"/>
  <text x="840" y="133" fill="#fef9c3" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">ANSWER</text>
  <text x="840" y="160" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Owner / Action</text>
  <text x="840" y="178" fill="#fef08a" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">business-ready output</text>

  <line x1="206" y1="160" x2="236" y2="160" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="386" y1="160" x2="416" y2="160" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="572" y1="160" x2="602" y2="160" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="754" y1="160" x2="784" y2="160" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="72" y="246" width="252" height="218" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="198" y="274" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">Why Grounding Alone Fails</text>
  <text x="94" y="310" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- correct page but wrong default owner</text>
  <text x="94" y="336" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- correct region but no table join</text>
  <text x="94" y="362" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- noisy OCR normalized too late</text>
  <text x="94" y="398" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">seeing the right block is necessary, but not sufficient</text>

  <rect x="354" y="246" width="252" height="218" rx="12" fill="#111827" stroke="#f97316" stroke-width="1.2"/>
  <text x="480" y="274" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">What Document Pipeline Adds</text>
  <text x="376" y="310" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- explicit page role routing</text>
  <text x="376" y="336" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- field normalization before reasoning</text>
  <text x="376" y="362" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- join summary page with approval / escalation page</text>
  <text x="376" y="398" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">the pipeline returns the business decision, not only extracted text</text>

  <rect x="636" y="246" width="252" height="218" rx="12" fill="#111827" stroke="#eab308" stroke-width="1.2"/>
  <text x="762" y="274" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">Metrics to Compare</text>
  <text x="658" y="310" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- task success rate</text>
  <text x="658" y="336" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- field_match_rate</text>
  <text x="658" y="362" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- observation_steps and reasoning_steps</text>
  <text x="658" y="388" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- grounded vs workflow regression diff</text>

  <rect x="136" y="486" width="688" height="24" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="502" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">A production multimodal document system must navigate, normalize, and join evidence before it can return a trustworthy operational decision.</text>
</svg>
