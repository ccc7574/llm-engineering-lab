<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="url(#bg)" rx="14"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Coding Evaluation Ladder</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">from single-function completion to repo-level triage and pass@k sampling</text>

  <rect x="40" y="84" width="880" height="446" fill="#0f172a" rx="14" stroke="#334155" stroke-width="1.2"/>

  <rect x="84" y="128" width="174" height="72" fill="#111827" rx="10" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="84" y="128" width="174" height="18" fill="url(#purple)" rx="10"/>
  <text x="171" y="141" fill="#f5f3ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">L1</text>
  <text x="171" y="165" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Completion</text>
  <text x="171" y="182" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">pass@1 only</text>

  <rect x="296" y="128" width="174" height="72" fill="#111827" rx="10" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="296" y="128" width="174" height="18" fill="url(#blue)" rx="10"/>
  <text x="383" y="141" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">L2</text>
  <text x="383" y="165" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Repo Context</text>
  <text x="383" y="182" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">retrieval recall</text>

  <rect x="508" y="128" width="174" height="72" fill="#111827" rx="10" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="508" y="128" width="174" height="18" fill="url(#orange)" rx="10"/>
  <text x="595" y="141" fill="#fff7ed" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">L3</text>
  <text x="595" y="165" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Judge + Patch</text>
  <text x="595" y="182" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">rerank + multi-file</text>

  <rect x="720" y="128" width="156" height="72" fill="#111827" rx="10" stroke="#059669" stroke-width="1.5"/>
  <rect x="720" y="128" width="156" height="18" fill="url(#green)" rx="10"/>
  <text x="798" y="141" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">L4</text>
  <text x="798" y="165" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Agentic</text>
  <text x="798" y="182" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">repair loop</text>

  <line x1="258" y1="164" x2="296" y2="164" stroke="#a855f7" stroke-width="1.9" marker-end="url(#arrow)"/>
  <line x1="470" y1="164" x2="508" y2="164" stroke="#a855f7" stroke-width="1.9" marker-end="url(#arrow)"/>
  <line x1="682" y1="164" x2="720" y2="164" stroke="#a855f7" stroke-width="1.9" marker-end="url(#arrow)"/>

  <rect x="84" y="258" width="380" height="220" fill="#111827" rx="12" stroke="#eab308" stroke-width="1.4"/>
  <text x="274" y="286" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">C21: pass@k / Sampling</text>
  <rect x="110" y="314" width="150" height="54" fill="#0f172a" rx="8" stroke="#475569" stroke-width="1"/>
  <text x="185" y="336" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">single_sample</text>
  <text x="185" y="353" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">greedy rank-1 only</text>
  <rect x="292" y="314" width="146" height="54" fill="#0f172a" rx="8" stroke="#eab308" stroke-width="1.2"/>
  <text x="365" y="336" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">sample_k</text>
  <text x="365" y="353" fill="#fef3c7" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">k candidates + execution</text>
  <line x1="260" y1="341" x2="292" y2="341" stroke="#eab308" stroke-width="1.7" marker-end="url(#arrow)"/>
  <text x="274" y="401" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">Key metrics</text>
  <text x="274" y="426" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2">- pass@1</text>
  <text x="274" y="444" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2">- pass@k</text>
  <text x="274" y="462" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2">- avg_candidates_sampled</text>

  <rect x="494" y="258" width="382" height="220" fill="#111827" rx="12" stroke="#10b981" stroke-width="1.4"/>
  <text x="685" y="286" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">C20: SWE-bench Style Triage</text>
  <rect x="520" y="314" width="150" height="54" fill="#0f172a" rx="8" stroke="#475569" stroke-width="1"/>
  <text x="595" y="336" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">issue_localized</text>
  <text x="595" y="353" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">entrypoint only</text>
  <rect x="702" y="314" width="148" height="54" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="1.2"/>
  <text x="776" y="336" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">triage_loop</text>
  <text x="776" y="353" fill="#d1fae5" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">read tests + shared helper</text>
  <line x1="670" y1="341" x2="702" y2="341" stroke="#10b981" stroke-width="1.7" marker-end="url(#arrow)"/>
  <text x="685" y="401" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">Key metrics</text>
  <text x="685" y="426" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2">- task_success_rate</text>
  <text x="685" y="444" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2">- avg_triage_reads</text>
  <text x="685" y="462" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2">- relevant_context_recall</text>

  <rect x="286" y="500" width="390" height="22" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="481" y="515" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">the coding track now measures completion, retrieval, rerank, repair, sampling, and repo-level triage as one ladder</text>
</svg>
