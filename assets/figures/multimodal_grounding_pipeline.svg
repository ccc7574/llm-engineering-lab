<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="14" fill="url(#bg)"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Multimodal Grounding Pipeline</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">M04: page routing first, region grounding second, structured extraction last</text>

  <rect x="36" y="84" width="888" height="438" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>

  <rect x="60" y="118" width="152" height="84" rx="10" fill="#111827" stroke="#7c3aed" stroke-width="1.4"/>
  <rect x="60" y="118" width="152" height="18" rx="10" fill="url(#purple)"/>
  <text x="136" y="131" fill="#f5f3ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">DOC PACK</text>
  <text x="136" y="158" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Multi-Page Input</text>
  <text x="136" y="176" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">forms, policy, invoice, routing sheet</text>

  <rect x="244" y="118" width="154" height="84" rx="10" fill="#111827" stroke="#1d4ed8" stroke-width="1.4"/>
  <rect x="244" y="118" width="154" height="18" rx="10" fill="url(#blue)"/>
  <text x="321" y="131" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">ROUTE</text>
  <text x="321" y="158" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Page Selection</text>
  <text x="321" y="176" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">which page contains the answer?</text>

  <rect x="430" y="118" width="154" height="84" rx="10" fill="#111827" stroke="#ea580c" stroke-width="1.4"/>
  <rect x="430" y="118" width="154" height="18" rx="10" fill="url(#orange)"/>
  <text x="507" y="131" fill="#fff7ed" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">GROUND</text>
  <text x="507" y="158" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Region Alignment</text>
  <text x="507" y="176" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">bounding box, table cell, field group</text>

  <rect x="616" y="118" width="154" height="84" rx="10" fill="#111827" stroke="#059669" stroke-width="1.4"/>
  <rect x="616" y="118" width="154" height="18" rx="10" fill="url(#green)"/>
  <text x="693" y="131" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">READ</text>
  <text x="693" y="158" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">Structured Parse</text>
  <text x="693" y="176" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle">owner, amount, action, exception</text>

  <rect x="802" y="118" width="94" height="84" rx="10" fill="#111827" stroke="#eab308" stroke-width="1.4"/>
  <rect x="802" y="118" width="94" height="18" rx="10" fill="url(#gold)"/>
  <text x="849" y="131" fill="#fef9c3" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.8" text-anchor="middle" font-weight="bold">EVAL</text>
  <text x="849" y="158" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" text-anchor="middle">Gate</text>
  <text x="849" y="176" fill="#fef08a" font-family="'SF Mono', 'Fira Code', monospace" font-size="8.6" text-anchor="middle">success + drift</text>

  <line x1="212" y1="160" x2="244" y2="160" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="398" y1="160" x2="430" y2="160" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="584" y1="160" x2="616" y2="160" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="770" y1="160" x2="802" y2="160" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="68" y="240" width="252" height="220" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="194" y="268" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">Page Routing Signals</text>
  <text x="90" y="304" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- title and section headers</text>
  <text x="90" y="330" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- page type: invoice / SLA / policy / contacts</text>
  <text x="90" y="356" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- query intent: owner, amount, approval, region</text>
  <text x="90" y="392" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">without this stage, OCR-only often reads the wrong page well</text>

  <rect x="354" y="240" width="252" height="220" rx="12" fill="#111827" stroke="#f97316" stroke-width="1.2"/>
  <text x="480" y="268" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">Region Grounding Checks</text>
  <text x="376" y="304" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- exact field block or table cell</text>
  <text x="376" y="330" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- OCR text linked to coordinates</text>
  <text x="376" y="356" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- normalized schema before final answer</text>
  <text x="376" y="392" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">grounding converts "seen text" into "trusted location"</text>

  <rect x="640" y="240" width="252" height="220" rx="12" fill="#111827" stroke="#eab308" stroke-width="1.2"/>
  <text x="766" y="268" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" text-anchor="middle" font-weight="bold">Metrics and Failure Modes</text>
  <text x="662" y="304" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- page hit rate</text>
  <text x="662" y="330" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- region hit rate</text>
  <text x="662" y="356" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- final answer accuracy</text>
  <text x="662" y="382" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.8">- noisy OCR vs grounded pipeline delta</text>
  <text x="662" y="418" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">what matters is not just reading more text; it is reading the right place first</text>

  <rect x="132" y="476" width="696" height="24" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="492" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">A production multimodal pipeline separates navigation from extraction. Otherwise accuracy collapses when documents become longer or noisier.</text>
</svg>
