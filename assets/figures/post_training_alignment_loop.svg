<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="url(#bg)" rx="14"/>
  <text x="480" y="36" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" text-anchor="middle" font-weight="bold">Post-Training Alignment Loop</text>
  <text x="480" y="56" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" text-anchor="middle">SFT base -> verifier / rejection -> DPO / GRPO-like updates -> release gate</text>

  <rect x="36" y="86" width="888" height="436" fill="#0f172a" rx="14" stroke="#334155" stroke-width="1.2"/>

  <rect x="62" y="120" width="164" height="76" fill="#111827" rx="10" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="62" y="120" width="164" height="18" fill="url(#purple)" rx="10"/>
  <text x="144" y="133" fill="#f5f3ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">INPUT</text>
  <text x="144" y="158" fill="#e9d5ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">SFT Checkpoint</text>
  <text x="144" y="175" fill="#c4b5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">instruction-following base</text>

  <rect x="254" y="120" width="174" height="76" fill="#111827" rx="10" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="254" y="120" width="174" height="18" fill="url(#blue)" rx="10"/>
  <text x="341" y="133" fill="#eff6ff" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">SELECTION</text>
  <text x="341" y="158" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Preference Signal</text>
  <text x="341" y="175" fill="#bfdbfe" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">chosen / rejected or reward</text>

  <rect x="456" y="120" width="174" height="76" fill="#111827" rx="10" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="456" y="120" width="174" height="18" fill="url(#orange)" rx="10"/>
  <text x="543" y="133" fill="#fff7ed" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">UPDATE</text>
  <text x="543" y="158" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">DPO / GRPO-like</text>
  <text x="543" y="175" fill="#fed7aa" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">relative policy change</text>

  <rect x="658" y="120" width="164" height="76" fill="#111827" rx="10" stroke="#059669" stroke-width="1.5"/>
  <rect x="658" y="120" width="164" height="18" fill="url(#green)" rx="10"/>
  <text x="740" y="133" fill="#ecfdf5" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle" font-weight="bold">OUTPUT</text>
  <text x="740" y="158" fill="#86efac" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle">Alignment Eval</text>
  <text x="740" y="175" fill="#bbf7d0" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.2" text-anchor="middle">samples + regressions</text>

  <line x1="226" y1="158" x2="254" y2="158" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="428" y1="158" x2="456" y2="158" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="630" y1="158" x2="658" y2="158" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="74" y="248" width="260" height="230" fill="#111827" rx="12" stroke="#3b82f6" stroke-width="1.3"/>
  <text x="204" y="276" fill="#93c5fd" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">Why DPO?</text>
  <text x="96" y="314" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- offline chosen vs rejected pairs</text>
  <text x="96" y="342" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- reference model anchors behavior</text>
  <text x="96" y="370" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- lower operational complexity</text>
  <text x="96" y="406" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.1">good for teaching style shift</text>
  <text x="96" y="424" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.1">without adding online sampling cost</text>

  <rect x="350" y="248" width="260" height="230" fill="#111827" rx="12" stroke="#f97316" stroke-width="1.3"/>
  <text x="480" y="276" fill="#fdba74" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">Why GRPO-like?</text>
  <text x="372" y="314" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- online candidate generation</text>
  <text x="372" y="342" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- reward signal can be richer</text>
  <text x="372" y="370" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- instability and reward hacking risk</text>
  <text x="372" y="406" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.1">good for teaching cost / stability tradeoffs</text>
  <text x="372" y="424" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.1">instead of pretending online RL is free</text>

  <rect x="626" y="248" width="272" height="230" fill="#111827" rx="12" stroke="#eab308" stroke-width="1.3"/>
  <text x="762" y="276" fill="#fde68a" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="bold">What Must Be Measured</text>
  <text x="648" y="314" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- chosen preference win rate</text>
  <text x="648" y="342" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- style / refusal drift</text>
  <text x="648" y="370" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- training stability and cost</text>
  <text x="648" y="398" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="10">- regression against existing SFT behavior</text>
  <text x="648" y="434" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.1">alignment is not only higher preference score</text>

  <rect x="260" y="500" width="440" height="22" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="480" y="515" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" text-anchor="middle">the lab teaches alignment as a controlled engineering loop, not as a mysterious last-stage magic trick</text>
</svg>
